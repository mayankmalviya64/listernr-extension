<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,400;0,600;0,700;0,800;1,600&display=swap" rel="stylesheet">
<style>
  input[type=range].lr-slider::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:20px;height:20px;border-radius:50%;background:#ffffff;border:3px solid #0e7fb8;box-shadow:0 3px 8px rgba(10,61,143,0.32);cursor:pointer;margin-top:-1px;}
  input[type=range].lr-slider::-moz-range-thumb{width:18px;height:18px;border-radius:50%;background:#ffffff;border:3px solid #0e7fb8;box-shadow:0 3px 8px rgba(10,61,143,0.32);cursor:pointer;}
  input[type=range].lr-slider::-webkit-slider-runnable-track{height:7px;border-radius:999px;}
</style>
</helmet>
<div style="width:300px;font-family:'Nunito',sans-serif;background:#ffffff;border-radius:18px;box-shadow:0 18px 50px rgba(11,42,92,0.22),0 2px 6px rgba(11,42,92,0.08);overflow:hidden;border:1px solid #e6ecf5;color:#0b2a5c;">

  <div onPointerDown="{{ onDragStart }}" style="display:flex;align-items:center;gap:11px;padding:12px 13px 11px;background:linear-gradient(135deg,#0a3d8f 0%,#0e63b3 55%,#13b0b8 140%);cursor:grab;user-select:none;touch-action:none;">
    <div style="width:32px;height:32px;border-radius:10px;background:rgba(255,255,255,0.16);display:flex;align-items:center;justify-content:center;flex:none;box-shadow:inset 0 0 0 1px rgba(255,255,255,0.22);">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#ffffff" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round"><path d="M4 9v6h4l5 4V5L8 9H4z"></path><path d="M16.5 8.5a5 5 0 0 1 0 7"></path><path d="M19.5 6a8 8 0 0 1 0 12"></path></svg>
    </div>
    <div style="display:flex;flex-direction:column;line-height:1.05;">
      <span style="font-size:17px;font-weight:800;color:#ffffff;letter-spacing:-0.3px;">Listenr</span>
      <span style="font-size:11px;font-weight:600;color:rgba(255,255,255,0.78);letter-spacing:0.2px;">Reads any page aloud</span>
    </div>
    <span style="margin-left:auto;font-size:9.5px;font-weight:800;letter-spacing:0.8px;color:#ffffff;background:rgba(255,255,255,0.18);padding:4px 8px;border-radius:999px;">TTS</span>
  </div>

  <div style="padding:14px;display:flex;flex-direction:column;gap:12px;">

    <div style="display:flex;flex-direction:column;gap:7px;position:relative;">
      <span style="font-size:10.5px;font-weight:800;letter-spacing:1px;color:#7d93b3;">VOICE</span>
      <button onClick="{{ onToggleDropdown }}" style="display:flex;align-items:center;gap:10px;width:100%;text-align:left;background:#f3f7fc;border:1.5px solid {{ voiceBorder }};border-radius:11px;padding:9px 11px;cursor:pointer;font-family:inherit;color:#0b2a5c;transition:border-color .15s;">
        <span style="width:24px;height:24px;border-radius:7px;background:#e3edfa;display:flex;align-items:center;justify-content:center;flex:none;">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#0e63b3" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path><path d="M19 10v1a7 7 0 0 1-14 0v-1M12 18v4"></path></svg>
        </span>
        <span style="display:flex;flex-direction:column;line-height:1.15;min-width:0;flex:1;">
          <span style="font-size:13.5px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">{{ selVoiceName }}</span>
          <span style="font-size:11px;font-weight:600;color:#8298b6;">{{ selVoiceLang }}</span>
        </span>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#7d93b3" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" style="flex:none;transform:rotate({{ chevronRot }});transition:transform .18s;"><path d="M6 9l6 6 6-6"></path></svg>
      </button>

      <sc-if value="{{ dropdownOpen }}" hint-placeholder-val="{{ false }}">
        <div style="position:absolute;top:100%;left:0;right:0;margin-top:6px;background:#ffffff;border:1.5px solid #e1e9f4;border-radius:13px;box-shadow:0 16px 36px rgba(11,42,92,0.18);padding:6px;z-index:20;max-height:212px;overflow-y:auto;">
          <sc-for list="{{ voices }}" as="v" hint-placeholder-count="6">
            <button onClick="{{ v.select }}" style="display:flex;align-items:center;gap:9px;width:100%;text-align:left;background:{{ v.rowBg }};border:none;border-radius:9px;padding:9px 10px;cursor:pointer;font-family:inherit;color:#0b2a5c;">
              <span style="display:flex;flex-direction:column;line-height:1.15;flex:1;min-width:0;">
                <span style="font-size:13px;font-weight:{{ v.rowWeight }};white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">{{ v.name }}</span>
                <span style="font-size:10.5px;font-weight:600;color:#8298b6;">{{ v.lang }}</span>
              </span>
              <span style="flex:none;color:#13b0b8;opacity:{{ v.checkOpacity }};">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"></path></svg>
              </span>
            </button>
          </sc-for>
        </div>
      </sc-if>
    </div>

    <div style="display:flex;flex-direction:column;gap:9px;">
      <div style="display:flex;align-items:center;">
        <span style="font-size:10.5px;font-weight:800;letter-spacing:1px;color:#7d93b3;">SPEED</span>
        <span style="margin-left:auto;font-size:14px;font-weight:800;color:#0a3d8f;background:#e3edfa;padding:3px 11px;border-radius:999px;min-width:46px;text-align:center;">{{ rateLabel }}</span>
      </div>
      <input type="range" class="lr-slider" min="1" max="4" step="{{ sliderStep }}" value="{{ rate }}" onInput="{{ onRateInput }}" style="-webkit-appearance:none;appearance:none;width:100%;height:7px;border-radius:999px;outline:none;cursor:pointer;background:{{ sliderFill }};" />
      <div style="display:flex;align-items:center;justify-content:space-between;gap:8px;">
        <span style="font-size:11px;font-weight:800;color:#9aabc4;width:22px;">1×</span>
        <sc-if value="{{ showControls }}" hint-placeholder-val="{{ true }}">
          <div style="display:flex;align-items:center;gap:16px;">
            <button onClick="{{ onPrev }}" title="Previous line" style="width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:#eef3f9;border:1px solid #e1e9f4;color:#0a3d8f;cursor:pointer;flex:none;">
              <svg width="17" height="17" viewBox="0 0 24 24" fill="currentColor"><path d="M18 5.5v13L9.2 12z"></path><rect x="5.5" y="5.5" width="2.6" height="13" rx="1.1"></rect></svg>
            </button>
            <button onClick="{{ onToggle }}" title="Play / Pause" style="width:46px;height:46px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#0a3d8f,#0e7fb8);color:#fff;border:none;cursor:pointer;flex:none;box-shadow:0 8px 18px rgba(10,61,143,0.3);">
              <sc-if value="{{ isPlaying }}" hint-placeholder-val="{{ false }}">
                <svg width="19" height="19" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="5" width="4" height="14" rx="1.3"></rect><rect x="14" y="5" width="4" height="14" rx="1.3"></rect></svg>
              </sc-if>
              <sc-if value="{{ showPlayIcon }}" hint-placeholder-val="{{ true }}">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor" style="margin-left:2px;"><path d="M7 4.5v15l13-7.5z"></path></svg>
              </sc-if>
            </button>
            <button onClick="{{ onNext }}" title="Next line" style="width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:#eef3f9;border:1px solid #e1e9f4;color:#0a3d8f;cursor:pointer;flex:none;">
              <svg width="17" height="17" viewBox="0 0 24 24" fill="currentColor"><path d="M6 5.5v13L14.8 12z"></path><rect x="15.9" y="5.5" width="2.6" height="13" rx="1.1"></rect></svg>
            </button>
          </div>
        </sc-if>
        <span style="font-size:11px;font-weight:800;color:#9aabc4;width:22px;text-align:right;">4×</span>
      </div>
    </div>

    <sc-if value="{{ showError }}" hint-placeholder-val="{{ false }}">
      <div style="display:flex;flex-direction:column;align-items:center;text-align:center;gap:8px;background:{{ errorBg }};border:1.5px solid {{ errorBorder }};border-radius:14px;padding:18px 16px;">
        <span style="width:38px;height:38px;border-radius:50%;background:{{ errorIconBg }};display:flex;align-items:center;justify-content:center;color:{{ errorIconColor }};">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"></circle><path d="M12 8v5M12 16.5v.01"></path></svg>
        </span>
        <span style="font-size:13.5px;font-weight:800;color:{{ errorTitleColor }};">{{ errorTitle }}</span>
        <span style="font-size:11.5px;font-weight:600;color:#6b7f9c;line-height:1.4;">{{ errorMsg }}</span>
      </div>
    </sc-if>


  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:320,&quot;height&quot;:470},&quot;status&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;idle&quot;,&quot;playing&quot;,&quot;paused&quot;,&quot;finished&quot;],&quot;default&quot;:&quot;idle&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;errorType&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;none&quot;,&quot;notext&quot;,&quot;protected&quot;],&quot;default&quot;:&quot;none&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;rate&quot;:{&quot;editor&quot;:&quot;float&quot;,&quot;default&quot;:1,&quot;min&quot;:1,&quot;max&quot;:4,&quot;step&quot;:0.25,&quot;tsType&quot;:&quot;number&quot;},&quot;dropdownOpen&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:false,&quot;tsType&quot;:&quot;boolean&quot;},&quot;selectedVoice&quot;:{&quot;editor&quot;:&quot;int&quot;,&quot;default&quot;:0,&quot;tsType&quot;:&quot;number&quot;},&quot;current&quot;:{&quot;editor&quot;:&quot;int&quot;,&quot;default&quot;:0,&quot;tsType&quot;:&quot;number&quot;},&quot;total&quot;:{&quot;editor&quot;:&quot;int&quot;,&quot;default&quot;:0,&quot;tsType&quot;:&quot;number&quot;},&quot;voices&quot;:{&quot;editor&quot;:null,&quot;tsType&quot;:&quot;Array&lt;{name:string,lang:string}&gt;&quot;},&quot;onPlay&quot;:{&quot;editor&quot;:null,&quot;tsType&quot;:&quot;() =&gt; void&quot;},&quot;onPause&quot;:{&quot;editor&quot;:null,&quot;tsType&quot;:&quot;() =&gt; void&quot;},&quot;onResume&quot;:{&quot;editor&quot;:null,&quot;tsType&quot;:&quot;() =&gt; void&quot;},&quot;onStop&quot;:{&quot;editor&quot;:null,&quot;tsType&quot;:&quot;() =&gt; void&quot;},&quot;onRateInput&quot;:{&quot;editor&quot;:null,&quot;tsType&quot;:&quot;(e:any) =&gt; void&quot;},&quot;onToggleDropdown&quot;:{&quot;editor&quot;:null,&quot;tsType&quot;:&quot;() =&gt; void&quot;},&quot;onSelectVoice&quot;:{&quot;editor&quot;:null,&quot;tsType&quot;:&quot;(i:number) =&gt; void&quot;}}">
class Component extends DCLogic {
  renderVals() {
    const p = this.props;
    const status = p.status ?? 'idle';
    const errorType = p.errorType ?? 'none';
    const rate = Number(p.rate ?? 1);
    const voices = Array.isArray(p.voices) ? p.voices : [];
    const sel = Number(p.selectedVoice ?? 0);
    const dropdownOpen = (p.dropdownOpen === true || p.dropdownOpen === 'true');
    const current = Number(p.current ?? 0);
    const total = Number(p.total ?? 0);

    const selV = voices[sel] || { name: 'System default', lang: 'auto' };
    const showError = errorType !== 'none';

    const rateLabel = (Math.round(rate * 10) / 10) + '×';
    const sliderStep = Number(p.step ?? 0.1);
    const pct = ((rate - 1) / 3) * 100;
    const sliderFill = `linear-gradient(90deg,#13b0b8 0%,#0e7fb8 ${pct}%,#dbe6f3 ${pct}%,#dbe6f3 100%)`;

    let statusText = 'Ready — press Play to begin', statusDot = '#9aabc4', statusDotHalo = 'rgba(154,171,196,0.18)';
    if (status === 'playing') { statusText = `Reading block ${current} of ${total}`; statusDot = '#13b8b0'; statusDotHalo = 'rgba(19,184,176,0.22)'; }
    else if (status === 'paused') { statusText = `Paused at block ${current} of ${total}`; statusDot = '#e9a23b'; statusDotHalo = 'rgba(233,162,59,0.22)'; }
    if (status === 'finished') { statusText = 'Finished reading the page'; statusDot = '#13b8b0'; statusDotHalo = 'rgba(19,184,176,0.22)'; }

    let errorTitle = '', errorMsg = '', errorBg = '#fff7ed', errorBorder = '#fbe2c4', errorIconBg = '#fcecd2', errorIconColor = '#d98b1f', errorTitleColor = '#a96612';
    if (errorType === 'notext') {
      errorTitle = 'No readable text found';
      errorMsg = 'This page doesn’t have article-style content for Listenr to read.';
    } else if (errorType === 'protected') {
      errorTitle = 'Listenr can’t read this page';
      errorMsg = 'Browser system pages (chrome://, extensions, web store) are protected and can’t be accessed.';
      errorBg = '#fdeef0'; errorBorder = '#f6d2d8'; errorIconBg = '#fbdce1'; errorIconColor = '#d8453c'; errorTitleColor = '#b23a36';
    }

    return {
      voices: voices.map((v, i) => ({
        name: v.name, lang: v.lang,
        rowBg: i === sel ? '#eef6fd' : 'transparent',
        rowWeight: i === sel ? 800 : 600,
        checkOpacity: i === sel ? 1 : 0,
        select: () => p.onSelectVoice && p.onSelectVoice(i),
      })),
      selVoiceName: selV.name,
      selVoiceLang: selV.lang,
      dropdownOpen,
      voiceBorder: dropdownOpen ? '#0e7fb8' : '#e1e9f4',
      chevronRot: dropdownOpen ? '180deg' : '0deg',
      rate, rateLabel, sliderFill, sliderStep,
      isIdle: status === 'idle' || status === 'finished',
      isPlaying: status === 'playing',
      isPaused: status === 'paused',
      showPlayIcon: status !== 'playing',
      showControls: !showError,
      showStop: !showError && (status === 'playing' || status === 'paused'),
      showError,
      errorTitle, errorMsg, errorBg, errorBorder, errorIconBg, errorIconColor, errorTitleColor,
      statusText, statusDot, statusDotHalo,
      onPlay: p.onPlay, onPause: p.onPause, onResume: p.onResume, onStop: p.onStop,
      onToggle: p.onToggle, onPrev: p.onPrev, onNext: p.onNext, onDragStart: p.onDragStart,
      onRateInput: p.onRateInput, onToggleDropdown: p.onToggleDropdown,
    };
  }
}
</script>
</body>
</html>
